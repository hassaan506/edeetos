<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detailed Registration - EDEETOS</title>
    <link rel="stylesheet" href="Style.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <img src="Pictures/Logo.png" alt="EDEETOS Logo" class="logo-img">
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Back to Home</a></li>
            </ul>
        </div>
    </nav>

    <section class="section-container auth-wrapper">
        <div class="glass-panel auth-card wide-card">
            <h2>Detailed Registration</h2>
            <p class="section-description">Help us tailor your EDEETOS mentorship experience.</p>
            
            <form id="register-form" class="contact-form">
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="reg-name" placeholder="Dr. John Doe" required>
                    </div>
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" id="reg-username" placeholder="johndoe99" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="reg-email" placeholder="john@example.com" required>
                    </div>
                    <div class="form-group">
                        <label>Phone / WhatsApp</label>
                        <input type="tel" id="reg-phone" placeholder="+92 300 0000000" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Current Institution / University</label>
                        <input type="text" id="reg-uni" placeholder="Aga Khan University" required>
                    </div>
                    <div class="form-group">
                        <label>Year of Study</label>
                        <select id="reg-year" class="custom-select" required>
                            <option value="" disabled selected>Select Year...</option>
                            <option value="1st Year">1st Year MBBS</option>
                            <option value="2nd Year">2nd Year MBBS</option>
                            <option value="3rd Year">3rd Year MBBS</option>
                            <option value="4th Year">4th Year MBBS</option>
                            <option value="Final Year">Final Year MBBS</option>
                            <option value="House Job">House Job / Intern</option>
                            <option value="Resident">Resident / PG</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Target Exam</label>
                        <select id="reg-exam" class="custom-select" required>
                            <option value="" disabled selected>Select Exam...</option>
                            <option value="FCPS Part 1">FCPS Part 1</option>
                            <option value="FCPS IMM">FCPS IMM</option>
                            <option value="FCPS Part 2">FCPS Part 2</option>
                            <option value="MBBS Prof">MBBS Professional</option>
                            <option value="MRCS / MRCP">MRCS / MRCP</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>City / Country</label>
                        <input type="text" id="reg-location" placeholder="Karachi, Pakistan" required>
                    </div>
                </div>

                <div class="form-group" style="margin-top: 1rem;">
                    <label>Password</label>
                    <input type="password" id="reg-password" placeholder="Create a strong password" required>
                </div>

                <button type="submit" class="btn-solid form-btn">Create EDEETOS Account</button>
            </form>

            <p class="auth-footer">Already have an account? <a href="login.html">Log In</a></p>

        </div>
    </section>

    <script type="module" src="register.js"></script>

</body>
</html>
