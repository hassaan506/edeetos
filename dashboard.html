<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - EDEETOS</title>
	<link rel="stylesheet" href="global.css">
	<link rel="stylesheet" href="dashboard.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <img src="Pictures/logo_transparent.png" alt="EDEETOS Logo" class="logo-img">
            </a>
            <ul class="nav-links">
                <li><button id="logout-btn" class="btn-outline" style="font-family: inherit; font-size: 1rem;">Logout</button></li>
            </ul>
        </div>
    </nav>

		<section class="section-container">
		<div class="dashboard-header">
			<h1>Welcome, <span id="user-name" class="highlight-text">Doctor</span></h1>
			<p>Current Path: <strong id="user-exam">Medical Student</strong></p>
		</div>

		<div class="feature-grid">
			<div class="glass-panel feature-card">
				<div class="icon">📚</div>
				<h3>Study Vault</h3>
				<p>Access notes and lectures for your specific exam.</p>
				<button class="btn-solid mini-btn">Open Vault</button>
			</div>

			<div class="glass-panel feature-card">
				<div class="icon">✍️</div>
				<h3>Question Bank</h3>
				<p>Test your knowledge with targeted high-yield MCQs.</p>
				<button class="btn-solid mini-btn">Start Practice</button>
			</div>

			<div class="glass-panel feature-card">
				<div class="icon">🩺</div>
				<h3>My Mentor</h3>
				<p>Book a session or message your dedicated guide.</p>
				<button class="btn-solid mini-btn">Contact Mentor</button>
			</div>
		</div>
		</section>

    <script type="module" src="dashboard.js"></script>

</body>
</html>
