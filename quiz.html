<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice Session - EDEETOS</title>
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="quiz.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="quiz-body">
    
    <header class="quiz-header">
        <button id="exit-btn" class="exit-btn" onclick="window.location.href='questions.html'">⬅ Exit Session</button>
        <div class="stats-container">
            <div class="stat-box">
                <span class="stat-label">Total Time</span>
                <span class="stat-value" id="timer-display">00:00</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">Skipped</span>
                <span class="stat-value" id="skipped-display">0</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">Total MCQs</span>
                <span class="stat-value" id="progress-display">1 / 1</span>
            </div>
        </div>
    </header>

    <main class="quiz-container">
        <div class="question-card glass-panel">
            
            <div class="card-utilities">
                <span id="question-id-badge" class="badge-blue">Question 1</span>
                <div class="icon-group">
                    <button class="icon-btn" title="Notes"><i class="fas fa-pen"></i></button>
                    <button class="icon-btn" title="Bookmark"><i class="far fa-star"></i></button>
                    <button class="icon-btn" title="Report"><i class="far fa-flag"></i></button>
                </div>
            </div>

            <div class="feedback-tracker">
                <span class="count-red" id="wrong-count">0 ✖</span>
                <div class="feedback-bar-bg">
                    <div class="feedback-bar-fill" id="feedback-fill" style="width: 0%;"></div>
                </div>
                <span class="count-green" id="right-count">0 ✔</span>
            </div>

            <div class="question-text" id="question-text">
                Loading question...
            </div>

            <div class="options-container" id="options-container">
                </div>

            <div class="card-actions">
                <button id="show-explanation-btn" class="btn-outline hidden">Show Explanation</button>
            </div>
        </div>
    </main>

    <div id="explanation-modal" class="modal-overlay hidden">
        <div class="modal-content glass-panel">
            <h3 style="color: #059669; margin-bottom: 1rem;">Explanation</h3>
            <p id="explanation-text">This is the explanation text.</p>
            <button id="close-explanation" class="btn-solid" style="margin-top: 1.5rem; width: 100%;">Got it</button>
        </div>
    </div>

    <footer class="quiz-footer">
        <button id="prev-btn" class="nav-btn"><i class="fas fa-arrow-left"></i></button>
        <button id="next-btn" class="nav-btn next-btn">Next <i class="fas fa-arrow-right"></i></button>
    </footer>

    <script src="quiz.js"></script>
</body>
</html>
