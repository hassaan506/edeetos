<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edeetos Preparation - Admin Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');
        
        body {
            margin: 0; padding: 0; font-family: 'Nunito', 'Segoe UI', sans-serif;
            background: linear-gradient(to bottom, #10b981 0%, #10b981 280px, #f0fdf4 280px, #f0fdf4 100%);
            min-height: 100vh; color: #1e293b;
        }

        .admin-container { max-width: 1000px; margin: 0 auto; padding: 1.5rem; }

        /* Floating Dark Top Bar */
        .top-bar {
            background: #1e293b; color: white; border-radius: 20px; padding: 1rem 2rem;
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .top-bar-left { display: flex; align-items: center; gap: 1rem; font-weight: 800; font-size: 1.2rem; }
        .q-count-badge { background: #334155; font-size: 0.75rem; padding: 0.3rem 0.8rem; border-radius: 20px; font-weight: 600; }
        .exit-btn {
            background: #334155; color: white; border: none; padding: 0.5rem 1.5rem;
            border-radius: 20px; cursor: pointer; font-weight: 800; transition: background 0.2s;
        }
        .exit-btn:hover { background: #475569; }

        /* Tabs Container */
        .tabs-container { display: flex; justify-content: center; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; }
        .admin-tab {
            background: white; border: none; padding: 0.8rem 2rem; border-radius: 12px; font-weight: 800;
            color: #475569; cursor: pointer; display: flex; align-items: center; gap: 0.5rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05); transition: all 0.2s; font-size: 1rem;
        }
        .admin-tab.active { background: #10b981; color: white; box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.3); }

        /* Main Content Box */
        .admin-content { margin-top: 1rem; }
        .page-title { color: #064e3b; font-size: 1.5rem; margin-bottom: 1rem; font-weight: 800; }
        
        .search-wrapper { display: flex; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05); border-radius: 12px; overflow: hidden; margin-bottom: 1.5rem; }
        .search-input { flex-grow: 1; border: none; padding: 1rem 1.5rem; font-size: 1rem; outline: none; font-family: 'Nunito', sans-serif; font-weight: 600;}
        .search-btn { background: #10b981; color: white; border: none; padding: 0 2rem; font-weight: 800; font-size: 1rem; cursor: pointer; }

        .glass-box { background: white; border-radius: 12px; padding: 1.5rem; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05); }

        /* Generic Forms */
        .form-group { margin-bottom: 1.2rem; text-align: left; }
        .form-group label { display: block; font-size: 0.8rem; font-weight: 800; color: #64748b; margin-bottom: 0.5rem; }
        .form-group select, .form-group input { width: 100%; padding: 0.8rem; border: 2px solid #e2e8f0; border-radius: 8px; outline: none; font-family: 'Nunito', sans-serif; font-weight: 600; color: #1e293b;}
        .btn-solid { background: #10b981; color: white; border: none; padding: 0.8rem 1.5rem; border-radius: 8px; font-weight: 800; cursor: pointer; width: 100%; transition: background 0.2s;}
        .btn-solid:hover { background: #059669; }

        /* Modals */
        .popup-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(4px); z-index: 2000; display: none; align-items: center; justify-content: center; }
        .popup-content { background: white; border-radius: 12px; padding: 1.5rem; width: 90%; max-width: 450px; max-height: 90vh; overflow-y: auto; text-align: center; }
        
        /* Edit User Specific Styles */
        .subs-box { border: 1px solid #e2e8f0; border-radius: 8px; padding: 1rem; margin-bottom: 1rem; text-align: left; display: flex; justify-content: space-between; align-items: center; }
        .subs-box.active-sub { border-color: #6ee7b7; background: #ecfdf5; }
        .grant-box { background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 8px; padding: 1rem; margin-bottom: 1.5rem; }
        
        /* Badges */
        .badge { font-size: 0.7rem; font-weight: 800; padding: 0.2rem 0.6rem; border-radius: 20px; display: inline-block;}
        .b-admin { background: #f3e8ff; color: #8b5cf6; }
        .b-student { background: #f1f5f9; color: #64748b; }
        .b-course { background: #e0f2fe; color: #0369a1; }
        .b-time { background: #dbeafe; color: #0284c7; }
    </style>
</head>
<body>

    <div class="admin-container">
        
        <div class="top-bar">
            <div class="top-bar-left">
                <i class="fas fa-shield-alt" style="color: #ef4444;"></i> Super Admin 
                <span class="q-count-badge" id="total-q-count">Questions: Loading...</span>
            </div>
            <button class="exit-btn" onclick="window.location.href='dashboard.html'">Exit</button>
        </div>

        <div class="tabs-container">
            <button class="admin-tab" onclick="switchView('reports')"><i class="fas fa-flag" style="color: #ef4444;"></i> Reports</button>
            <button class="admin-tab" onclick="switchView('payments')"><i class="fas fa-file-invoice-dollar" style="color: #f59e0b;"></i> Payments</button>
            <button class="admin-tab" onclick="switchView('keys')"><i class="fas fa-key" style="color: #d97706;"></i> Keys</button>
            <button class="admin-tab active" onclick="switchView('users')"><i class="fas fa-users" style="color: #10b981;"></i> Users</button>
        </div>

        <div id="view-users" class="admin-content">
            <h2 class="page-title">User Manager</h2>
            <div class="search-wrapper">
                <input type="text" id="admin-search-input" class="search-input" placeholder="User UID or Email...">
                <button id="admin-search-btn" class="search-btn">Search</button>
            </div>
            <div class="glass-box" style="padding: 0; max-height: 500px; overflow-y: auto;">
                <div style="font-size: 0.8rem; color: #64748b; font-weight: 800; padding: 1rem; border-bottom: 1px solid #e2e8f0;">
                    <span id="user-count">0</span> Users
                </div>
                <div id="users-list" style="padding: 0 1rem;">
                    <p style="text-align: center; color: #94a3b8; padding: 2rem;">Loading users database...</p>
                </div>
            </div>
        </div>

        <div id="view-keys" class="admin-content" style="display: none;">
            <h2 class="page-title"><i class="fas fa-key" style="color: #d97706;"></i> Create Key / Coupon</h2>
            <div class="glass-box" style="margin-bottom: 2rem;">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group" style="grid-column: span 2;">
                        <label>Key for Course:</label>
                        <select id="key-course">
                            <option value="fcps_part1">FCPS Part 1</option>
                            <option value="fcps_part2">FCPS Part 2</option>
                            <option value="mrcs_part1">MRCS Part 1</option>
                            <option value="mbbs_year5">MBBS Year 5</option>
                            <option value="ALL">All Courses (Full Premium)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Plan Duration</label>
                        <select id="key-duration">
                            <option value="1">1 Day</option>
                            <option value="7">1 Week</option>
                            <option value="30">1 Month</option>
                            <option value="180">6 Months</option>
                            <option value="lifetime">Lifetime</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Custom Code (Optional)</label>
                        <input type="text" id="key-custom" placeholder="E.G. SALE2026">
                    </div>
                    <div class="form-group">
                        <label>Max Users (1 = Single Use)</label>
                        <input type="number" id="key-usage" value="1">
                    </div>
                    <div class="form-group">
                        <label>Expires On (Optional)</label>
                        <input type="date" id="key-expiry">
                    </div>
                </div>
                <button class="btn-solid" onclick="generateKey()">Generate Key</button>
            </div>

            <div class="glass-box" style="padding: 0;">
                <table style="width: 100%; text-align: left; border-collapse: collapse; font-size: 0.9rem;">
                    <tr style="border-bottom: 2px solid #e2e8f0; color: #64748b;">
                        <th style="padding: 1rem;">Code</th><th>Course</th><th>Usage</th><th>Action</th>
                    </tr>
                    <tbody id="keys-table-body">
                        </tbody>
                </table>
            </div>
        </div>

        <div id="view-payments" class="admin-content" style="display: none;">
            <h2 class="page-title">Payment Requests</h2>
            <div id="payments-list">
                <p style="text-align: center; color: #94a3b8;">No pending payment requests.</p>
            </div>
        </div>

        <div id="view-reports" class="admin-content" style="display: none;">
            <h2 class="page-title">Flagged Reports</h2>
            <p style="color: #64748b;">System logs and user reports will appear here.</p>
        </div>

    </div>

    <div id="edit-user-modal" class="popup-overlay">
        <div class="popup-content">
            <h2 style="color: #1e3a8a; margin: 0; font-weight: 800;">User</h2>
            <p id="edit-user-email" style="font-weight: 700; color: #3b82f6; margin: 0.2rem 0;">user@example.com</p>
            <p id="edit-user-uid" style="font-size: 0.7rem; color: #94a3b8; margin-bottom: 1.5rem;">ID: ...</p>
            
            <div style="text-align: left;">
                <label style="font-size: 0.75rem; font-weight: 800; color: #94a3b8; text-transform: uppercase;">Active Subscriptions</label>
                <div id="user-subscriptions-list" style="margin-top: 0.5rem; max-height: 150px; overflow-y: auto;">
                    </div>

                <div class="grant-box">
                    <label style="font-size: 0.85rem; font-weight: 800; color: #064e3b; margin-bottom: 0.5rem; display: block;">🎁 Grant New Access</label>
                    <div style="display: flex; gap: 0.5rem; margin-bottom: 0.5rem;">
                        <select id="grant-course" style="flex: 2; padding: 0.6rem; border: 1px solid #bbf7d0; border-radius: 6px; outline: none; font-family: inherit;">
                            <option value="fcps_part1">FCPS Part 1</option>
                            <option value="fcps_part2">FCPS Part 2</option>
                            <option value="mrcs_part1">MRCS Part 1</option>
                            <option value="mbbs_year5">MBBS Year 5</option>
                        </select>
                        <select id="grant-duration" style="flex: 1; padding: 0.6rem; border: 1px solid #bbf7d0; border-radius: 6px; outline: none; font-family: inherit;">
                            <option value="1">1 Day</option>
                            <option value="30">1 Month</option>
                            <option value="lifetime">Lifetime</option>
                        </select>
                    </div>
                    <button class="btn-solid" onclick="grantAccess()" style="padding: 0.6rem;">Grant Access</button>
                </div>

                <label style="font-size: 0.75rem; font-weight: 800; color: #b45309; text-transform: uppercase; margin-bottom: 0.5rem; display: block;">⚠️ Account Actions</label>
                <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                    <button id="btn-toggle-admin" class="btn-solid" style="background: #475569;">⬇ Remove Admin Access</button>
                    <button class="btn-solid" style="background: #ef4444;">⛔ Ban User</button>
                    <button class="btn-solid" style="background: #7f1d1d;">🗑️ Delete User</button>
                </div>
            </div>

            <button onclick="document.getElementById('edit-user-modal').style.display='none'" class="btn-outline" style="border: none; text-decoration: underline; margin-top: 1.5rem;">Close</button>
        </div>
    </div>

    <script type="module" src="admin.js"></script>

</body>
</html>
